<!DOCTYPE html>
<html>

<head>
    <title>Nepali New Year 2081</title>
    <meta property="og:title" content="Nepali New Year 2081" />
    <meta property="og:description"
        content="Wishing everyone a happy new year filled with progress, innovation, and maybe even a few bug-free code deployments!" />
    <meta property="og:image" content="assets/images/new_year.png" />
    <meta property="og:url" content="https://pitam.com.np" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        h1 {
            cursor: pointer;
            transition: color 0.5s;
        }
    </style>
</head>

<body>
    <h1 id="greeting">Happy Nepali New Year 2081!</h1>

    <script>
        document.getElementById('greeting').addEventListener('click', function () {
            this.style.color = '#' + Math.floor(Math.random() * 16777215).toString(16);
        });
    </script>
</body>

</html>
